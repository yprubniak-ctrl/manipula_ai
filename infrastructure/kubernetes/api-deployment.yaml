apiVersion: v1
kind: Namespace
metadata:
  name: manipula
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: manipula-config
  namespace: manipula
data:
  NODE_ENV: "production"
  API_PORT: "3000"
  LOG_LEVEL: "info"
---
apiVersion: v1
kind: Secret
metadata:
  name: manipula-secrets
  namespace: manipula
type: Opaque
data:
  # Base64 encoded secrets - replace with actual values
  DATABASE_URL: cG9zdGdyZXNxbDovL21hbmlwdWxhOnBhc3N3b3JkQHBvc3RncmVzOjU0MzIvbWFuaXB1bGE=
  REDIS_URL: cmVkaXM6Ly9yZWRpczozMDAwMA==
  JWT_SECRET: Y2hhbmdlLXRoaXMtc2VjcmV0LWtleQ==
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: manipula-api
  namespace: manipula
  labels:
    app: manipula
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: manipula
      component: api
  template:
    metadata:
      labels:
        app: manipula
        component: api
    spec:
      containers:
      - name: api
        image: ghcr.io/manipula/manipula-platform/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: manipula-config
              key: NODE_ENV
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: manipula-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: manipula-secrets
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: manipula-secrets
              key: JWT_SECRET
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: manipula-secrets
              key: OPENAI_API_KEY
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: manipula-secrets
              key: ANTHROPIC_API_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: manipula-api
  namespace: manipula
  labels:
    app: manipula
    component: api
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
  selector:
    app: manipula
    component: api
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: manipula-api
  namespace: manipula
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - api.manipula.dev
    secretName: manipula-api-tls
  rules:
  - host: api.manipula.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: manipula-api
            port:
              number: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: manipula-api
  namespace: manipula
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: manipula-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
